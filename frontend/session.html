<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentOS — Session</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    /* ── Top status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px; height: 48px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .status-label { font-size: 12px; font-weight: 600; color: var(--text-2); }
    .status-info  { font-size: 11px; color: var(--text-3); }
    .layer-badge {
      padding: 3px 10px;
      background: rgba(108,99,255,.1);
      border: 1px solid rgba(108,99,255,.2);
      border-radius: 100px;
      font-size: 10px; font-weight: 700; color: var(--primary);
    }

    /* ── Main layout ── */
    .layout {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ── Left: Org Chart ── */
    .chart-pane {
      flex: 1; display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chart-title { font-size: 12px; font-weight: 600; color: var(--text-2); }
    .chart-controls { display: flex; gap: 6px; }
    .chart-body {
      flex: 1; overflow: auto;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 24px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.07) transparent;
    }
    #org-chart-container { position: relative; }

    /* ── Right panel: feeds ── */
    .right-pane {
      width: 340px; flex-shrink: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Agent feed */
    .feed-section {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
      border-bottom: 1px solid var(--border);
    }
    .feed-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .feed-title { font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .feed-count {
      font-size: 9px; padding: 2px 6px;
      background: var(--card); border-radius: 100px; color: var(--text-3);
    }
    #agent-feed {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.06) transparent;
    }

    /* Messages feed */
    .msg-section {
      height: 220px; flex-shrink: 0; display: flex; flex-direction: column;
    }
    .msg-section .feed-header { border-top: 1px solid var(--border); }
    #global-feed {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.06) transparent;
    }

    /* ── Agent Detail Panel (slide-in) ── */
    #agent-panel {
      display: none;
      position: absolute; right: 340px; top: 0; bottom: 0;
      width: 380px; z-index: 50;
      background: var(--surface);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      flex-direction: column;
      box-shadow: -8px 0 40px rgba(0,0,0,.4);
      animation: slide-in .22s ease;
    }
    @keyframes slide-in {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── Loading skeleton ── */
    .skel-node {
      width: 110px; height: 88px; border-radius: 14px;
      margin: 8px;
    }

    /* ── WS indicator ── */
    #ws-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 10px; color: var(--text-3);
    }
    #ws-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-4); }
    #ws-dot.connected    { background: var(--success); animation: pulse-dot 1.6s infinite; }
    #ws-dot.disconnected { background: var(--error); }
    #ws-dot.reconnecting { background: var(--warning); animation: pulse-dot 1s infinite; }
  </style>
</head>
<body>
  <!-- Topbar -->
  <nav class="topbar">
    <div class="topbar-logo">
      <div class="logo-icon">A</div>
      AgentOS
    </div>
    <nav class="topbar-nav">
      <a href="index.html">Home</a>
      <a href="session.html" class="active">Session</a>
      <a href="results.html">Results</a>
    </nav>
    <div style="display:flex;gap:8px;align-items:center">
      <div id="ws-status">
        <div id="ws-dot"></div>
        <span id="ws-label">Connecting…</span>
      </div>
      <button class="btn btn-secondary btn-sm" id="btn-pause" onclick="togglePause()">⏸ Pause</button>
      <button class="btn btn-primary btn-sm" onclick="goToResults()">View Results →</button>
    </div>
  </nav>

  <!-- Status bar -->
  <div class="status-bar">
    <div>
      <div class="status-label" id="status-text">Initializing…</div>
      <div class="status-info" id="status-sub">Loading session</div>
    </div>
    <div style="flex:1;max-width:280px">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <span class="layer-badge" id="layer-badge">Layer 0</span>
    <span style="font-size:11px;color:var(--text-3)" id="agent-count">0 agents</span>
    <button class="btn btn-secondary btn-sm ml-auto" onclick="copySessionId()">
      Copy ID: <span id="session-id-display">—</span>
    </button>
  </div>

  <!-- Main layout -->
  <div class="layout" style="position:relative">

    <!-- Org Chart -->
    <div class="chart-pane">
      <div class="chart-header">
        <span class="chart-title">Organization Graph</span>
        <div class="chart-controls">
          <button class="btn btn-icon" onclick="zoomChart(1.1)" title="Zoom In">+</button>
          <button class="btn btn-icon" onclick="zoomChart(0.9)" title="Zoom Out">−</button>
          <button class="btn btn-icon" onclick="resetZoom()" title="Reset">⊡</button>
        </div>
      </div>
      <div class="chart-body" id="chart-body">
        <!-- Skeleton loading -->
        <div id="chart-skeleton" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
          <div class="skeleton skel-node"></div>
          <div class="skeleton skel-node"></div>
          <div class="skeleton skel-node"></div>
        </div>
        <div id="org-chart-container"></div>
      </div>
    </div>

    <!-- Agent Detail Panel -->
    <div id="agent-panel"></div>

    <!-- Right pane -->
    <div class="right-pane">
      <!-- Agent Feed -->
      <div class="feed-section">
        <div class="feed-header">
          <span class="feed-title">
            <span class="status-dot dot-running" id="feed-dot"></span>
            Agent Activity
          </span>
          <span class="feed-count" id="agent-count-badge">0</span>
        </div>
        <div id="agent-feed">
          <div class="empty-state" style="padding:32px 16px">
            <div class="empty-icon">◈</div>
            <p style="font-size:12px">Agents will appear here as they are created</p>
          </div>
        </div>
      </div>

      <!-- Messages Feed -->
      <div class="msg-section">
        <div class="feed-header">
          <span class="feed-title">
            ✉ Inter-Agent Messages
          </span>
          <span class="feed-count" id="msg-count">0</span>
        </div>
        <div id="global-feed">
          <div class="empty-state" style="padding:20px 16px">
            <p style="font-size:11px">Agent messages will stream here</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toasts" id="toasts"></div>

  <script src="js/api.js"></script>
  <script src="js/ws.js"></script>
  <script src="js/orgChart.js"></script>
  <script src="js/agentPanel.js"></script>
  <script>
    /* ── Session bootstrap ── */
    const params    = new URLSearchParams(window.location.search);
    const SESSION_ID = params.get('id');
    let msgCount    = 0;
    let agentTotal  = 0;
    let doneCount   = 0;
    let chartScale  = 1;
    let paused      = false;

    if (!SESSION_ID) {
      window.location.href = 'index.html';
    }

    document.getElementById('session-id-display').textContent = SESSION_ID;

    /* ── Init UI modules ── */
    OrgChart.init('org-chart-container');
    AgentPanel.init('agent-panel', 'agent-feed');

    /* ── Load session data ── */
    async function bootstrap() {
      try {
        const session = await API.getSession(SESSION_ID);
        setStatus(`Session: ${session.description.substring(0,60)}…`, session.status);

        // Register any existing agents
        if (session.agents && session.agents.length) {
          document.getElementById('chart-skeleton').style.display = 'none';
          session.agents.forEach(agent => {
            OrgChart.addAgent(agent);
            AgentPanel.register(agent);
          });
          updateCounts(session.agents.length, session.agents.filter(a => a.status === 'done').length);
        }

        // Start execution if session is in draft
        if (session.status === 'draft') {
          await API.runSession(SESSION_ID);
        }

        // Connect WebSocket
        connectWS();

      } catch (err) {
        showToast('Could not load session: ' + err.message, 'error');
        setWsStatus('disconnected', 'Backend offline');
      }
    }

    /* ── WebSocket ── */
    function connectWS() {
      setWsStatus('connecting', 'Connecting…');
      WS.connect(SESSION_ID);

      WS.on('ws_open', () => {
        setWsStatus('connected', 'Live');
      });

      WS.on('ws_close', () => {
        setWsStatus('reconnecting', 'Reconnecting…');
      });

      WS.on('ws_failed', () => {
        setWsStatus('disconnected', 'Disconnected');
        showToast('Lost connection to server', 'error');
      });

      WS.on('layer_start', ({ layer, agents: agentRoles }) => {
        document.getElementById('layer-badge').textContent = `Layer ${layer}`;
        document.getElementById('chart-skeleton').style.display = 'none';
        setStatus(`Executing Layer ${layer}`, `Agents: ${agentRoles.join(', ')}`);
      });

      WS.on('agent_created', (data) => {
        const agent = data;
        OrgChart.addAgent(agent);
        AgentPanel.register(agent);
        agentTotal++;
        document.getElementById('agent-count').textContent = `${agentTotal} agents`;
        document.getElementById('agent-count-badge').textContent = agentTotal;
        document.getElementById('chart-skeleton').style.display = 'none';
      });

      WS.on('agent_started', ({ agent_id }) => {
        OrgChart.setStatus(agent_id, 'running');
        AgentPanel.markStarted(agent_id);
        updateAgentActivityDot(agent_id, 'running');
      });

      WS.on('agent_token', ({ agent_id, token }) => {
        AgentPanel.streamToken(agent_id, token);
      });

      WS.on('message_sent', (msg) => {
        AgentPanel.addMessage(msg);
        msgCount++;
        document.getElementById('msg-count').textContent = msgCount;
        // Remove empty state
        const empty = document.querySelector('#global-feed .empty-state');
        if (empty) empty.remove();
      });

      WS.on('agent_done', ({ agent_id, output_summary }) => {
        OrgChart.setStatus(agent_id, 'done');
        AgentPanel.markDone(agent_id, output_summary);
        updateAgentActivityDot(agent_id, 'done');
        doneCount++;
        if (agentTotal > 0) {
          const pct = Math.round((doneCount / agentTotal) * 100);
          document.getElementById('progress-fill').style.width = pct + '%';
          setStatus(`${doneCount} / ${agentTotal} agents complete`, `${pct}% done`);
        }
      });

      WS.on('agent_error', ({ agent_id, error }) => {
        OrgChart.setStatus(agent_id, 'error');
        showToast(`Agent error: ${error}`, 'error');
      });

      WS.on('session_done', ({ session_id }) => {
        setWsStatus('connected', 'Complete');
        setStatus('All agents complete!', 'Session finished');
        document.getElementById('progress-fill').style.width = '100%';
        showToast('Organization complete! View results.', 'success');
        setTimeout(() => {
          document.getElementById('btn-pause').style.display = 'none';
        }, 500);
      });
    }

    /* ── Helpers ── */
    function setStatus(title, sub) {
      document.getElementById('status-text').textContent = title;
      document.getElementById('status-sub').textContent  = sub || '';
    }

    function setWsStatus(state, label) {
      const dot = document.getElementById('ws-dot');
      dot.className = state;
      document.getElementById('ws-label').textContent = label;
    }

    function updateCounts(total, done) {
      agentTotal = total; doneCount = done;
      document.getElementById('agent-count').textContent       = `${total} agents`;
      document.getElementById('agent-count-badge').textContent  = total;
      if (total > 0) document.getElementById('progress-fill').style.width = Math.round((done/total)*100) + '%';
    }

    function updateAgentActivityDot(agentId, status) {
      const dotEl = document.getElementById(`actdot-${agentId}`);
      if (dotEl) { dotEl.className = `status-dot dot-${status}`; }
    }

    function togglePause() {
      paused = !paused;
      const btn = document.getElementById('btn-pause');
      btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
    }

    function zoomChart(factor) {
      chartScale = Math.max(0.4, Math.min(2, chartScale * factor));
      document.getElementById('org-chart-container').style.transform = `scale(${chartScale})`;
      document.getElementById('org-chart-container').style.transformOrigin = 'top center';
    }

    function resetZoom() {
      chartScale = 1;
      document.getElementById('org-chart-container').style.transform = '';
    }

    function goToResults() {
      window.location.href = `results.html?id=${SESSION_ID}`;
    }

    function copySessionId() {
      navigator.clipboard.writeText(SESSION_ID).then(() => showToast('Session ID copied!', 'success'));
    }

    function showToast(msg, type='info') {
      const wrap = document.getElementById('toasts');
      const el   = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✕':'ℹ'}</span><span>${msg}</span>`;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }

    /* ── Click on node → open panel ── */
    document.addEventListener('node-click', ({ detail: agent }) => {
      document.getElementById('agent-panel').style.display = 'flex';
    });

    /* ── Start ── */
    bootstrap();
  </script>
</body>
</html>
